<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="theme-color" content="#13151A">
<title>Otobako</title>
<link rel="manifest" href="./manifest.json">
<link rel="apple-touch-icon" href="./icon-192.png">
<style>
  :root {
    --bg:           #13151A;
    --surface:      #1B1E26;
    --surface2:     #232733;
    --text:         #F2EDE4;
    --text-dim:     #9AA0AC;
    --accent:       #D9A24B;
    --accent-soft:  rgba(217, 162, 75, 0.15);
    --accent-glow:  rgba(217, 162, 75, 0.35);
    --ok:           #5A6B5D;
    --line:         #2C313D;
    --error:        #E07070;
  }

  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, "Hiragino Sans", "Yu Gothic UI", system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
    overflow: hidden;
  }

  /* ============================================================
     ログイン画面
  ============================================================ */
  #login-screen {
    position: fixed;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background:
      radial-gradient(ellipse at 50% 30%, rgba(217,162,75,0.12), transparent 60%),
      var(--bg);
    z-index: 100;
    padding: 32px 24px;
  }
  #login-screen.hidden { display: none; }

  .login-logo {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 8px;
  }
  .login-logo .dot {
    width: 14px;
    height: 14px;
    border-radius: 999px;
    background: var(--accent);
    box-shadow: 0 0 12px var(--accent-glow);
  }
  .login-logo h1 {
    font-size: 1.7rem;
    font-weight: 800;
    letter-spacing: 0.14em;
    color: var(--text);
  }
  .login-tagline {
    font-size: 0.75rem;
    color: var(--text-dim);
    letter-spacing: 0.05em;
    margin-bottom: 40px;
  }

  .login-card {
    width: 100%;
    max-width: 340px;
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: 18px;
    padding: 28px 24px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .login-field {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .login-field label {
    font-size: 0.72rem;
    color: var(--text-dim);
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }
  .login-field input {
    background: var(--surface2);
    border: 1px solid var(--line);
    border-radius: 10px;
    color: var(--text);
    font-size: 0.95rem;
    padding: 12px 14px;
    outline: none;
    transition: border-color 0.15s;
    -webkit-appearance: none;
  }
  .login-field input:focus {
    border-color: var(--accent);
  }

  #login-error {
    font-size: 0.75rem;
    color: var(--error);
    text-align: center;
    min-height: 1.2em;
  }

  #login-btn {
    background: var(--accent);
    color: var(--bg);
    border: none;
    border-radius: 10px;
    padding: 14px;
    font-size: 0.95rem;
    font-weight: 700;
    letter-spacing: 0.05em;
    cursor: pointer;
    transition: opacity 0.15s, transform 0.1s;
  }
  #login-btn:active { opacity: 0.85; transform: scale(0.98); }

  /* ============================================================
     メインアプリ
  ============================================================ */
  #app {
    position: fixed;
    inset: 0;
    display: flex;
    flex-direction: column;
  }
  #app.hidden { display: none; }

  /* ==============================
     上半分: ビジュアライザー + コントロール
  ============================== */
  #stage {
    flex: 0 0 50%;
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    background-color: var(--bg);
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    transition: background-image 0.4s ease;
  }

  /* 背景画像の上に暗いオーバーレイ（ビジュアライザーを見やすくする） */
  #stage::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(to bottom,
      rgba(19, 21, 26, 0.55),
      rgba(19, 21, 26, 0.70)
    );
    pointer-events: none;
    z-index: 0;
  }

  /* ステージ内の要素をオーバーレイより前面に */
  #stage > * { position: relative; z-index: 1; }

  #visualizer {
    width: 200px;
    height: 200px;
    flex-shrink: 0;
  }

  #now-info {
    text-align: center;
    padding: 10px 24px 0;
    max-width: 100%;
  }
  #now-title {
    font-size: 0.92rem;
    font-weight: 700;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 88vw;
  }
  #now-artist {
    font-size: 0.72rem;
    color: var(--text-dim);
    margin-top: 3px;
  }

  /* シークバー */
  #seek-wrap {
    width: 88vw;
    max-width: 360px;
    display: flex;
    flex-direction: column;
    gap: 4px;
    margin-top: 12px;
  }
  #seek-bar {
    width: 100%;
    -webkit-appearance: none;
    appearance: none;
    height: 3px;
    border-radius: 999px;
    background: var(--line);
    outline: none;
  }
  #seek-bar::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 14px;
    height: 14px;
    border-radius: 999px;
    background: var(--accent);
    cursor: pointer;
  }
  #seek-bar::-moz-range-thumb {
    width: 14px; height: 14px;
    border: none; border-radius: 999px;
    background: var(--accent); cursor: pointer;
  }
  #seek-times {
    display: flex;
    justify-content: space-between;
    font-size: 0.68rem;
    color: var(--text-dim);
    font-variant-numeric: tabular-nums;
  }

  /* コントロールボタン */
  #controls {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 28px;
    margin-top: 14px;
  }
  .ctrl-btn {
    background: none;
    border: none;
    color: var(--text);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    cursor: pointer;
  }
  .ctrl-btn .icon {
    width: 44px;
    height: 44px;
    border-radius: 999px;
    border: 1.5px solid var(--line);
    background: var(--surface);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1rem;
  }
  .ctrl-btn .label {
    font-size: 0.6rem;
    color: var(--text-dim);
    letter-spacing: 0.04em;
  }
  .ctrl-btn:active .icon { transform: scale(0.93); }

  #play-btn .icon {
    width: 60px;
    height: 60px;
    font-size: 1.4rem;
    background: var(--accent);
    border-color: var(--accent);
    color: var(--bg);
    box-shadow: 0 0 22px var(--accent-glow);
  }

  #shuffle-btn .icon {
    font-size: 0.9rem;
  }
  #shuffle-btn.active .icon {
    border-color: var(--accent);
    color: var(--accent);
    background: var(--accent-soft);
  }

  /* オフラインバナー */
  #status-banner {
    position: absolute;
    top: 10px;
    left: 16px;
    right: 16px;
    font-size: 0.7rem;
    padding: 5px 10px;
    border-radius: 8px;
    background: var(--accent-soft);
    color: var(--accent);
    text-align: center;
    display: none;
  }
  #status-banner.show { display: block; }

  /* ==============================
     下半分: プレイリスト
  ============================== */
  #list-pane {
    flex: 1;
    display: flex;
    flex-direction: column;
    min-height: 0;
    border-top: 1px solid var(--line);
  }

  #list-header {
    flex-shrink: 0;
    padding: 10px 16px 8px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid var(--line);
  }
  #list-header h2 {
    font-size: 0.72rem;
    letter-spacing: 0.12em;
    color: var(--text-dim);
    text-transform: uppercase;
    font-weight: 600;
  }
  #list-header .right {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  #list-header .count { font-size: 0.7rem; color: var(--text-dim); }
  #logout-btn {
    font-size: 0.68rem;
    color: var(--text-dim);
    background: none;
    border: 1px solid var(--line);
    border-radius: 8px;
    padding: 3px 9px;
    cursor: pointer;
  }

  #track-list {
    flex: 1;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
  }

  #loading-state, #error-state, #empty-state {
    text-align: center;
    color: var(--text-dim);
    font-size: 0.82rem;
    padding: 32px 20px;
    line-height: 1.7;
  }
  #error-state { display: none; color: var(--error); }
  #empty-state  { display: none; }

  .track-row {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 16px;
    border-bottom: 1px solid var(--line);
    cursor: pointer;
    transition: background 0.1s;
  }
  .track-row:active { background: var(--surface); }
  .track-row.playing { background: var(--accent-soft); }

  .track-row .idx {
    width: 20px;
    text-align: center;
    font-size: 0.75rem;
    color: var(--text-dim);
    flex-shrink: 0;
  }
  .track-row.playing .idx { color: var(--accent); }

  .track-row .meta { flex: 1; min-width: 0; }
  .track-row .meta .name {
    font-size: 0.9rem;
    font-weight: 600;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .track-row.playing .meta .name { color: var(--accent); }
  .track-row .meta .sub {
    font-size: 0.68rem;
    color: var(--text-dim);
    margin-top: 2px;
  }

  .action-btn {
    flex-shrink: 0;
    width: 34px; height: 34px;
    border-radius: 999px;
    border: 1px solid var(--line);
    background: transparent;
    color: var(--text-dim);
    font-size: 0.9rem;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
  }
  .action-btn.saved { border-color: var(--ok); color: var(--ok); }
  .action-btn:disabled { opacity: 0.3; }
  .action-btn:not(:disabled):active { transform: scale(0.92); }

  #list-footer {
    flex-shrink: 0;
    border-top: 1px solid var(--line);
    padding: 8px 16px;
    font-size: 0.68rem;
    color: var(--text-dim);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  #list-footer button {
    background: none;
    border: 1px solid var(--line);
    color: var(--text-dim);
    border-radius: 8px;
    padding: 4px 10px;
    font-size: 0.68rem;
    cursor: pointer;
  }
</style>
</head>
<body>

<!-- ===== ログイン画面 ===== -->
<div id="login-screen">
  <div class="login-logo">
    <div class="dot"></div>
    <h1>OTOBAKO</h1>
  </div>
  <p class="login-tagline">音だけを、持ち歩く。</p>

  <div class="login-card">
    <div class="login-field">
      <label>ID</label>
      <input type="text" id="login-id" placeholder="IDを入力" autocomplete="username" autocorrect="off" autocapitalize="none">
    </div>
    <div class="login-field">
      <label>パスワード</label>
      <input type="password" id="login-pw" placeholder="パスワードを入力" autocomplete="current-password">
    </div>
    <div id="login-error"></div>
    <button id="login-btn">ログイン</button>
  </div>
</div>

<!-- ===== メインアプリ ===== -->
<div id="app" class="hidden">

  <div id="stage">
    <div id="status-banner"></div>
    <canvas id="visualizer" width="200" height="200"></canvas>
    <div id="now-info">
      <div id="now-title">曲を選んでください</div>
      <div id="now-artist"></div>
    </div>
    <div id="seek-wrap">
      <input type="range" id="seek-bar" min="0" max="100" value="0" step="0.1">
      <div id="seek-times">
        <span id="seek-current">0:00</span>
        <span id="seek-duration">0:00</span>
      </div>
    </div>
    <div id="controls">
      <button class="ctrl-btn" id="back-btn">
        <div class="icon">↺</div>
        <span class="label">5秒戻し</span>
      </button>
      <button class="ctrl-btn" id="play-btn">
        <div class="icon" id="play-icon">▶</div>
        <span class="label" id="play-label">再生</span>
      </button>
      <button class="ctrl-btn" id="fwd-btn">
        <div class="icon">↻</div>
        <span class="label">5秒送り</span>
      </button>
      <button class="ctrl-btn" id="shuffle-btn">
        <div class="icon">⇄</div>
        <span class="label" id="shuffle-label">シャッフル</span>
      </button>
    </div>
    <audio id="audio-el"></audio>
  </div>

  <div id="list-pane">
    <div id="list-header">
      <h2>プレイリスト</h2>
      <div class="right">
        <span class="count" id="track-count"></span>
        <button id="logout-btn">ログアウト</button>
      </div>
    </div>
    <div id="track-list">
      <div id="loading-state">読み込み中…</div>
      <div id="error-state"></div>
      <div id="empty-state">music/playlist.json に曲を追加してください。</div>
    </div>
    <div id="list-footer">
      <span id="storage-info">保存容量: 取得中…</span>
      <button id="clear-btn">保存を削除</button>
    </div>
  </div>

</div>

<script src="./app.js"></script>
</body>
</html>
